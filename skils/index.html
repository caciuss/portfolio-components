<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skills</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    font-family:Inter,sans-serif;
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.skill{
    display:flex;
    align-items:center;
    gap:14px;

    background:#1c1c1c;
    border:1px solid #2b2b2b;
    border-radius:18px;

    padding:18px 22px;

    color:white;
    font-size:26px;
    font-weight:600;

    transition:.25s;
    cursor:default;
}

.skill:hover{
    background:#242424;
    transform:translateY(-2px);
}

.icon{
    width:26px;
    height:26px;
    object-fit:contain;
    flex-shrink:0;
}

@media(max-width:900px){

.grid{
    grid-template-columns:1fr;
}

.skill{
    font-size:22px;
}

}

</style>

</head>

<body>

<div class="grid">

<div class="skill"><img src="icons/photoshop.svg" class="icon" alt="">Adobe Photoshop</div>

<div class="skill"><img src="icons/adobe illustrator.svg" class="icon" alt="">Adobe Illustrator</div>

<div class="skill"><img src="icons/after effects.svg" class="icon" alt="">Adobe After Effects</div>

<div class="skill"><img src="icons/adobe premiere.svg" class="icon" alt="">Adobe Premiere Pro</div>

<div class="skill"><img src="icons/figma.svg" class="icon" alt="">Figma</div>

<div class="skill"><img src="icons/adobe indesign.svg" class="icon" alt="">Adobe InDesign</div>

<div class="skill"><img src="icons/notion.svg" class="icon" alt="">Notion</div>

<div class="skill"><img src="icons/motion design.svg" class="icon" alt="">Motion Design</div>

<div class="skill"><img src="icons/graphic design.svg" class="icon" alt="">Graphic Design</div>

<div class="skill"><img src="icons/video editing.svg" class="icon" alt="">Video Editing</div>

<div class="skill"><img src="icons/content creation.svg" class="icon" alt="">Content Creation</div>

<div class="skill"><img src="icons/creative strategy.svg" class="icon" alt="">Creative Strategy</div>

<div class="skill"><img src="icons/digital marketing.svg" class="icon" alt="">Digital Marketing</div>

<div class="skill"><img src="icons/branding.svg" class="icon" alt="">Branding</div>

</div>

</body>

</html>

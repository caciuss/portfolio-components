<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skills</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#111;
font-family:Inter,sans-serif;
padding:30px;

}

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;

}

.skill{

display:flex;
align-items:center;

gap:14px;

background:#1c1c1c;

border:1px solid #2b2b2b;

border-radius:18px;

padding:18px 22px;

color:white;

font-size:26px;

font-weight:600;

transition:.25s;

cursor:default;

}

.skill:hover{

background:#242424;

transform:translateY(-2px);

}

.icon{

width:26px;
height:26px;

color:#bfbfbf;

}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

.skill{

font-size:22px;

}

}

</style>

</head>

<body>

<div class="grid">

<div class="skill"><i data-lucide="image" class="icon"></i>Adobe Photoshop</div>

<div class="skill"><i data-lucide="pen-tool" class="icon"></i>Adobe Illustrator</div>

<div class="skill"><i data-lucide="clapperboard" class="icon"></i>Adobe After Effects</div>

<div class="skill"><i data-lucide="film" class="icon"></i>Adobe Premiere Pro</div>

<div class="skill"><i data-lucide="layout-grid" class="icon"></i>Figma</div>

<div class="skill"><i data-lucide="book-open" class="icon"></i>Adobe InDesign</div>

<div class="skill"><i data-lucide="notebook-tabs" class="icon"></i>Notion</div>

<div class="skill"><i data-lucide="sparkles" class="icon"></i>Motion Design</div>

<div class="skill"><i data-lucide="palette" class="icon"></i>Graphic Design</div>

<div class="skill"><i data-lucide="play-circle" class="icon"></i>Video Editing</div>

<div class="skill"><i data-lucide="smartphone" class="icon"></i>Content Creation</div>

<div class="skill"><i data-lucide="line-chart" class="icon"></i>Creative Strategy</div>

<div class="skill"><i data-lucide="megaphone" class="icon"></i>Digital Marketing</div>

<div class="skill"><i data-lucide="lightbulb" class="icon"></i>Branding</div>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
